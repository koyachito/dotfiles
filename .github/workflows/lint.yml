# push / PR のたびにシェルスクリプトを静的解析する
# lint はスクリプトを実行しないため、Ubuntu ランナーで問題ない
name: Lint

on: [push, pull_request]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      # 対象ファイルを配列に集めてから shellcheck を1回だけ実行する。
      # パイプ + while はサブシェルになり失敗フラグが親に伝わらないため使わない。
      # mapfile -t: コマンドの出力を1行1要素で配列に読み込む
      # < <(...): プロセス置換。パイプと違い while/mapfile が親シェルで動く
      - name: Run shellcheck
        run: |
          mapfile -t files < <(git ls-files)
          targets=()
          for f in "${files[@]}"; do
            if head -n1 "$f" 2>/dev/null | grep -q '^#!.*sh'; then
              targets+=("$f")
            fi
          done
          echo "Targets: ${targets[*]}"
          # 対象ゼロ件なら shellcheck が引数エラーになるため先に成功終了
          [ "${#targets[@]}" -eq 0 ] && exit 0
          shellcheck "${targets[@]}"


