# ~/.config/hypr/hyprpaper.conf
# Hyprland同梱のデフォルト壁紙3枚をローテーションで使う。
# preload済み画像はメモリに保持される（3枚程度なら数十MBで問題ない）。

preload = /usr/share/hyprland/wall0.png
preload = /usr/share/hyprland/wall1.png
preload = /usr/share/hyprland/wall2.png

# 起動直後の初期壁紙（モニタ名を空にして全モニタ適用）
wallpaper = , /usr/share/hyprland/wall0.png

splash = false

# 実行中のIPC操作（hyprctl hyprpaper）を許可する。デフォルトonだが明示。
ipc = on
