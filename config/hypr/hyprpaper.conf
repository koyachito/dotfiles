# ~/.config/hypr/hyprpaper.conf
# Hyprland同梱のデフォルト壁紙をローテーションで使う（切り替えはwallpaper-rotate + timer）。
# 注意: hyprpaperはHyprland 0.54世代で設定構文が刷新された。
#   旧: preload = path / wallpaper = monitor,path  ← 新版では無視される
#   新: wallpaper {} ブロック。preloadは廃止され読み込みは自動管理。
# ここでは起動直後の初期壁紙のみ定義し、以降の切り替えはIPC（reload）で行う。

wallpaper {
    # monitor を空にすると全モニタに適用
    monitor =
    path = /usr/share/hypr/wall0.png
    # 画面いっぱいに拡大して埋める（アスペクト比維持、はみ出しはクロップ）
    fit_mode = cover
}

# 以下はブロック外に書くグローバル設定
splash = false

# hyprctl hyprpaper ... によるIPC操作を許可（切り替えスクリプトが使用）
ipc = on
