# ~/.config/hypr/hyprland.conf

################
# Variables
################

$mainMod = SUPER
$terminal = kitty
$menu = fuzzel

################
# Monitor
################

monitor = ,preferred,auto,1

################
# Environment
################

env = XCURSOR_SIZE,24

env = XMODIFIERS,@im=fcitx

################
# Input
################

input {
    kb_layout = us
    repeat_delay = 300
    repeat_rate = 25

    touchpad {
        natural_scroll = true
    }

    follow_mouse = 0
}

################
# Startup
################ 

# exec-once = hyprpaper
exec-once = waybar -c ~/.config/waybar/config-hypr -s ~/.config/waybar/style.css
exec-once = mako
exec-once = fcitx5
exec-once = wlsunset -T 6500 -t 2800 -l 19.4326 -L -99.1332
exec-once = systemctl --user start xremap.service
exec-once = hypridle

# KDE Connect
# - Waylandセッションでのみ意味がある（通知・クリップボード共有など）
# - DBus Activationで起動するが初回スマホ側からの接続ではプロセスがないのでネットワークの待ち受けが機能しない
# - そのためWM依存で常時起動
exec-once = kdeconnectd

################
# Misc
################

misc {
	disable_hyprland_logo = false
	force_default_wallpaper = 2
}

################
# Decoration
################

decoration {
    rounding = 10
    active_opacity = 0.90
    inactive_opacity = 0.80

    blur {
        enabled = true
        size = 6
        passes = 2
    }
}

################
# Applications
################

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, SPACE, exec, firefox
bind = $mainMod, Y, exec, kitty -e yazi

# ChatGPT
bind = SUPER, C, exec, firefox --new-tab https://chatgpt.com

# Spotify
bind = SUPER, S, exec, firefox --new-tab https://open.spotify.com

# GitHub
bind = SUPER, G, exec, firefox --new-tab https://github.com

bind = $mainMod CTRL, L, exec, hyprlock
bind = $mainMod, X, exec, ~/.local/bin/powermenu

################
# Session
################

bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, E, exit

################
# Focus
################

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r

################
# Move windows
################

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

################
# Window
################

bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, SPACE, togglefloating

################
# Resize
################

bind = $mainMod, R, submap, resize

submap = resize

binde = , H, resizeactive, -10 0
binde = , J, resizeactive, 0 10
binde = , K, resizeactive, 0 -10
binde = , L, resizeactive, 10 0

bind = , Return, submap, reset
bind = , Escape, submap, reset

submap = reset

################
# Workspaces
################

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

################
# Screenshot
################

bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/ScreenShots/$(date +'%Y-%m-%d_%H-%M-%S').png
bind = SHIFT, Print, exec, grim ~/Pictures/ScreenShots/$(date +'%Y-%m-%d_%H-%M-%S').png
bind = CTRL, Print, exec, sh -c 'grim -g "$(slurp)" - | wl-copy'

################
# Audio
################

bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

################
# Brightness
################

bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
